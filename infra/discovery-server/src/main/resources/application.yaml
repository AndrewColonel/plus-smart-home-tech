logging:
  level:
    ru.yandex.practicum.infra.discoveryserver: TRACE
    org:
      springframework: INFO
      springframework.cloud.netflix.eureka: INFO

server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/