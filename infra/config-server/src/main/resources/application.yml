logging:
  level:
    ru.yandex.practicum.infra.configserver: INFO
    org:
      springframework: INFO

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations:
            - classpath:config/telemetry/{application}

server:
  port: 8888

eureka:
  client:
    enable: true
    registerWithEureka: true
    fetchRegistry: false
    serviceUrl:
#      defaultZone: http://localhost:8761/eureka/
      defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/
