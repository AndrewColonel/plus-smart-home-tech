logging:
  level:
    ru.yandex.practicum.infra: TRACE
    org:
      springframework: INFO

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations:
            - classpath:config/telemetry/{application}

server:
  port: 8888