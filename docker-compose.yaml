version: "3"
services:
   # Eureka Server
  discovery-server:
    build:
      context: ./infra/discovery-server
      dockerfile: Dockerfile
#    image: discovery-server
    container_name: eureka-server
    ports:
      - "8761:8761"  # UI Eureka доступен на хосте
#    volumes:
#      - ./eureka-server/target/eureka-server.jar:/app.jar
#    command: java -jar /app.jar
#    environment:
#      - SPRING_PROFILES_ACTIVE=docker
#      - CONFIG_SERVER_HOST=config-server
    healthcheck:
      start_period: 10s
      test: ["CMD-SHELL", "curl -f http://localhost:8761"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - sht

  # Config Server
  config-server:
    build:
      context: ./infra/config-server
      dockerfile: Dockerfile
#    image: config-server
    container_name: config-server
    ports:
      - "8888:8888"  # пробрасываем на хост для отладки
#    volumes:
#      - ./config-server/target/config-server.jar:/app.jar
#    command: java -jar /app.jar
    environment:
      - eureka.instance.hostname=discovery-server
#      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      start_period: 10s
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/info"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - sht


  # gateway
  gateway:
    build:
      context: ./infra/gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - eureka.instance.hostname=discovery-server
    restart: on-failure
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - sht


