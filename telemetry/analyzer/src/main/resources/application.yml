spring:
  application:
    name: analyzer
  config:
#    import: configserver:http://localhost:8888
    import: "configserver:"
  cloud:
    config:
      fail-fast: true
      retry:
        useRandomPolicy: true
        max-interval: 6000
      discovery:
        enabled: true
#        под каким именем зарегистрирован сервер конфигурации в Eureka - config-server
        serviceId: config-server
eureka:
  client:
    serviceUrl:

      #      зона обнаружения серсиса-реестра
#      defaultZone: http://localhost:8761/eureka/
      defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/
#      порт этого сервиса, по умолчпнию 8080
#    server:
#      port: 59091

#       не регистрироваться в сервисе-реестре
#      registerWithEureka: false

